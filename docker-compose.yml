version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: magnate_db
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend 
    container_name: magnate_backend
    restart: always
    command: bash -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 mi_juego.wsgi:application"
    env_file: .env
    depends_on:
      - db
    command: >
        sh -c "python manage.py migrate && 
               python manage.py collectstatic --noinput &&
               gunicorn --bind 0.0.0.0:8000 mi_proyecto.wsgi:application"
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend-web
    container_name: magnate_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:

