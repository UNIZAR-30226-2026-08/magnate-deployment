services:
  db:
    image: postgres:15-alpine
    container_name: magnate_db
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"

  redis:
    image: redis:7-alpine
    container_name: magnate_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: magnate_backend
    restart: always
    env_file: .env
    depends_on:
      - db
    command: >
        sh -c "python manage.py migrate && 
               python manage.py collectstatic --noinput &&
               gunicorn --bind 0.0.0.0:8000 mi_proyecto.wsgi:application"
    ports:
      - "${BACKEND_PORT}:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend-web
      args:
        - REACT_APP_API_URL=/api
    container_name: magnate_frontend_web
    restart: always
    ports:
      - "${FRONTEND_HTTP_PORT}:80"
      - "${FRONTEND_HTTPS_PORT}:443"
    volumes:
      - ./ssl-certs:/etc/nginx/ssl:ro
      - ./desktop-releases:/usr/share/nginx/html/downloads:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

