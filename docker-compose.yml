services:
  db:
    image: postgres:15-alpine
    container_name: magnate_db
    restart: always
    environment:
      - POSTGRES_USER=magnate_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=magnate_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: magnate_redis
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: magnate_backend
    restart: always
    environment:
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=magnate_db
      - DB_USER=magnate_user
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALLOWED_HOSTS=192.168.50.12,localhost,backend #mover a .env??????????
      - CORS_ALLOWED_ORIGINS=https://192.168.50.12:${FRONTEND_HTTPS_PORT}
    env_file: .env
    depends_on:
      - db
      - redis
    command: >
       sh -c "python manage.py makemigrations magnate &&
             python manage.py migrate magnate &&
             python manage.py migrate &&
             python manage.py loaddata items.json &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 magnate.wsgi:application"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend-web
      args:
        - VITE_API_BASE_URL=/api
    container_name: magnate_frontend_web
    restart: always
    ports:
      - "${FRONTEND_HTTP_PORT}:80"
      - "${FRONTEND_HTTPS_PORT}:443"
    volumes:
      - ./ssl-certs:/etc/nginx/ssl:ro
      - ./desktop-releases:/usr/share/nginx/html/downloads:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

