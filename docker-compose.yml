version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: magnate_db
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: magnate_backend
    restart: always
    env_file: .env
    depends_on:
      - db
    command: >
        sh -c "python manage.py migrate && 
               python manage.py collectstatic --noinput &&
               gunicorn --bind 0.0.0.0:8000 mi_proyecto.wsgi:application"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
            dockerfile: Dockerfile.frontend-web
            args:
              - REACT_APP_API_URL=/api
    container_name: magnate_frontend_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl-certs:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres_data:

